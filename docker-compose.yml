services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --app-dir
      - backend
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    env_file: .env
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "app.bot.runtime"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
